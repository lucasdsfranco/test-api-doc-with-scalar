            example: {}
      summary: Finalizar lote de movimentos
      operationId: Finalizar lote de movimentos
      description: >-
        Fecha o lote atual em aberto, vinculando a ele todos os títulos
        adicionados até o momento e, na sequência, inicia o seu processamento.


        Para a execução desta etapa, é obrigatório enviar o nome e o CNPJ da
        entidade compradora dos títulos dentro do objeto `"data"`. Como o campo
        `"data"` aceita chaves dinâmicas (pares de chave/valor livres), a
        escolha dos nomes dessas chaves é livre. No payload de exemplo,
        utilizamos `buyer_name` e `buyer_tax_number`.


        O objeto `"data"` aceita um número indeterminado de campos customizados,
        permitindo o envio de qualquer outra informação adicional que seja
        relevante para a negociação (Ex: `buyer_control_number`).
