          schema:
            type: number
        - name: size
          in: body
          description: '**Query String.** Quantidade de itens por página'
          required: true
          x-example: '100'
          schema:
            type: number
        - name: start_date
          in: body
          description: >-
            **Query String.** Data inicial dos resultados apresentados. Formato:
            AAAA-MM-DD<br>
          required: false
          x-example: '2023-01-01'
          schema:
            type: string
        - name: end_date
          in: body
          description: >-
            **Query String.** Data final dos resultados apresentados. Formato:
            AAAA-MM-DD<br>
          required: false
          x-example: '2023-01-10'
          schema:
            type: string
        - name: origin
          in: header
