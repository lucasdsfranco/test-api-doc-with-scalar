securityDefinitions:
  oauth2:
    type: oauth2
    flow: accessCode
    authorizationUrl: ''
    tokenUrl: ''
    scopes: {}
tags:
  - name: Authentication
    description: >-
      <h2 id="oauth2"> <a href="#oauth2"> oAuth2 </a> </h2>


      A API Plataforma IDT utiliza como protocolo de autenticação o padrão
      <b>oAuth2</b>. Para autenticação é necessário requsitar um <b>token</b> de
      acesso para utilizar os demais endpoints da API. Esse <b>token</b> é uma
      chave de acesso <b>JWT</b> que deverá ser requerida através de um
      endpoint, informando as credenciais de acesso do usuário. Havendo sucesso
      na requisição, é gerado então o “<b><i>token de acesso</b></i>”, retornado
      no body da resposta da requisição, conforme especificação do protocolo
      <b><i>OpenID Connect</b></i>.


      <b>Passo 1:</b>


      Para obter o <b>token de acesso (JWT)</b>, o consumidor/cliente deve fazer
      uma requisição <b>POST</b> para a <b>URL</b> correspondente ao ambiente
      que deseja acessar:


      <table>
          <tr>
              <td><b>Ambiente</b></td>
              <td><b>URL</b></td>
          </tr>
          <tr>
              <td>Playground</td>
              <td>https://account-play.plataformaidt.com.br/realms/iDtrust/protocol/openid-connect/token/</td>
          </tr>
          <tr>
              <td>Produção</td>
              <td>https://accounts.plataformaidt.io/auth/realms/finanfor/protocol/openid-connect/token/</td>
          </tr>
      </table>


      Parâmetros necessários para a requisição do token:

      <br></br><br></br>

      <b>Parâmetros do Header para requisição POST</b>


      <table>
          <tr>
              <td><b>Variavél</b></td>
              <td><b>Descrição</b></td>
          </tr>
          <tr>
              <td>ContentType</td>
              <td>Tipo do conteúdo da requisição que está sendo enviada. Nesta requisição deve ser enviada como um formulário</td>
          </tr>
      </table>


      <b>Exemplo de header</b>


      <pre>
          <code> Content-Type: application/x-www-form-urlencoded </code>
      </pre>


      <br></br>


      <pre>

      <b>Parâmetros do Body para requisição POST</b>

      </pre>


      <table>
          <tr>
              <td><b>Variavél</b></td>
              <td><b>Descrição</b></td>
          </tr>
          <tr>
              <td>grant_type</td>
              <td>Especifica para o provedor o tipo de autorização. Para esta requisição será utilizado <b><i>password</i></b></td>
          </tr>
          <tr>
              <td>username</td>
              <td>Nome do usuário que deseja requisitar o token</td>
          </tr>
          <tr>
              <td>password</td>
              <td>Senha do usuário que deseja requisitar o token</td>
          </tr>
          <tr>
              <td>client_id</td>
              <td>Utilize <b><i>mutant-public</b></i>.</td>
          </tr>
      </table>


      <br></br>

      <b>Exemplo de query</b>


      <pre>
          <code>
              curl --location --request POST ''https://account-play.plataformaidt.com.br/realms/iDtrust/protocol/openid-connect/token'' \
              --header ''Content-Type: application/x-www-form-urlencoded'' \
              --data-urlencode ''grant_type=password'' \
              --data-urlencode ''username=usuario_da_api@plataformaidt.com.br'' \
              --data-urlencode ''password=minha_senha'' \
              --data-urlencode ''client_id=mutant-public''
          </code>
      </pre>


      <b>Exemplo de retorno da API (statusCode 200)</b>


      <pre>
          <code>
              {
                  "access_token":
                  "abcdefghijlnmopqrstuvxwykz0123456789",
                  "expires_in": 3600,
                  "refresh_expires_in": 1800,
                  "refresh_token":
                  "abcdefghijlnmopqrstuvxwykz0123456789",
                  "token_type": "Bearer",
                  "not-before-policy": 1683827720,
                  "session_state": "75a5b179-5a53-4852-8460-31f5af223bc5",
                  "scope": "email profile"
              }
          </code>
      </pre>


      <b>Passo 2:</b>


      De posse das informações do <b><i>json</b></i> anterior com o <b><i>token
      de acesso (“access_token”)</b></i>, a aplicação consumidora estará
      habilitada para consultar dados de recursos protegidos, que são as
      informações e métodos de acesso do usuário a <i>API Plataforma IDT</i>.


      <br><b>Exemplo de acesso a recursos protegidos do sistema</b>


      Como exemplo vamos realizar uma busca por todos os movimentos de um
      programa de crédito. Para isso será utilizado o recurso <i>"Buscar
      Movimentos"</i>, onde deverá ser feita uma requisição <b>GET</b> para o
      endereço "<b>https://api.play.plataformaidt.com.br/v1/movements</b>".


      <b>Parâmetros do Header para requisição GET</b>


      <table>
          <tr>
              <td><b>Variavél</b></td>
              <td><b>Descrição</b></td>
          </tr>
          <tr>
              <td>Authorization</td>
              <td>Palavra <b>Bearer</b> e o <b>ACCESS_TOKEN</b> da requisição</td>
          </tr>
          <tr>
              <td>origin</td>
              <td>URL do programa do crédito</td>
          </tr>
      </table>


      <b>Exemplo de header</b>


      <pre>
          <code>
              Authorization:Bearer < access_token ><br>
              origin:https://empresaexemplo.finan4.net
          </code>
      </pre>


      <b>Exemplo de query</b>


      <pre>
          <code>
              curl --location --request GET ''https://api.play.plataformaidt.com.br/v1/movements/assets?page=0&size=50&start_date=2020-01-01&end_date=2021-12-10'' \
              --header ''origin: https://empresaexemplo.finan4.net'' \
              --header ''Authorization: Bearer < access_token >''
          </code>
      </pre>


      <b>IMPORTANTE: Todos os endpoints e requisições desta API possuem como
      requisito o envio do parâmetro "<i>origin</i>" (URL do programa do
      crédito) no header da requisição.</b>
  - name: Criar movimento
  - name: Buscar movimento
  - name: Filtrar movimento
  - name: Buscar movimento relacionado
  - name: Aprovar ou reprovar um movimento
  - name: Atualizar movimento
  - name: Lote de Movimentos
    description: >-
      Os lotes de movimentos permitem agrupar de maneira assíncrona múltiplos
      ativos de lastro financeiro (*assets*) dentro de uma única negociação
      (*trade*).


      A criação e efetivação desta negociação ocorre em 3 etapas consecutivas:


      1. **Abertura do lote (`POST /draft_movements/trade`):** Cria um novo
      lote. Funciona como um "envelope" lógico que receberá e armazenará os
      títulos que serão negociados.


      2. **Adição de itens ao lote (`PUT
      /draft_movements/trade/{uuid_identificador_do_lote}/children`):** Anexa
      uma lista de ativos ao lote criado. Pode ser usado de maneira incremental
      múltiplas vezes enquanto o lote estiver aberto.


      3. **Finalização do lote (`PUT /draft_movements/trade`):** Fecha o lote em
      aberto e dispara seu processamento com todos os títulos anexados até o
      momento.


      **Observação**: Assim como no uso dos demais endpoints da API da
      Plataforma IDT, todas as requisições deste fluxo exigem autenticação
      prévia e envio obrigatório das seguintes informações no header das
      requisições:


      * `Authorization`: `Bearer {token}` (Token JWT obtido no endpoint de
      login).


      * `Origin`: URL identificadora do programa (Ex:
      `https://nome_do_programa.play.plataformaidt.com.br` para ambiente de
      playground ou `https://nome_do_programa.plataformaidt.io` para ambiente de
      produção).


      Para mais detalhes sobre a geração de credenciais, consultar a seção
      Authentication.
