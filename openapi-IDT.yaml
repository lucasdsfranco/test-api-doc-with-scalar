  /draft_movements/trade/{uuid_identificador_do_lote}/children:
    put:
      responses:
        '202':
          description: Accepted
          headers: {}
          examples:
            application/json: {}
          schema:
            type: object
            properties: {}
            example: {}
      summary: Adicionar movimentos em um lote
      operationId: Adicionar movimentos em um lote
      description: >-
        Anexa uma lista de ativos ao lote especificado.


        Cada movimento incluído ao lote representa um ativo ou título de lastro
        que está sendo acrescentado à negociação.


        Este endpoint pode ser invocado de maneira incremental, tendo a
        possibilidade de ser chamado múltiplas vezes enquanto o lote permanecer
        com o status aberto.


        #### Detalhamento dos campos do payload


        * `id` (string, obrigatório) - tipo do movimento internamente no sistema
        - Ex: asset


        * `type.type` (string, obrigatório) - tipo do título que está sendo
        negociado. Ex: CCB, Contrato, Fatura...


        * `to.name` (string, obrigatório) - nome do cliente


        * `to.tax_number` (string, obrigatório) - CPF do cliente


        O campo `data` aceita qualquer par de chave/valor. 

        No payload de exemplo foram listados dados mínimos e obrigatórios de um
        título. 

        Caso necessário, mais informações podem ser adicionadas a este campo na
        forma de chaves customizadas livremente.


        * `data.id` (string, obrigatório) - id único do título


        * `data.amount` (string, obrigatório) - valor do título


        * `data.disbursement` (string, obrigatório) - valor cedido do título


        * `data.external_id` (string, obrigatório) - id adicional (caso não haja
        outro, repetir o valor do data.id)


        * `data.number` (string, obrigatório) - número do título


        * `data.number_of_installments` (integer, obrigatório) - número de
        parcelas


        * `data.first_installment_date` (string, obrigatório) - data da primeira
        parcela


        * `data.last_installment_date` (string, obrigatório) - data da última
        parcela
      tags:
        - Lote de Movimentos
      parameters:
        - name: uuid_identificador_do_lote
          in: path
          description: identificador UUID exclusivo do lote
          required: true
          x-example: 7686d387-a7e2-44c7-b764-b0adac4e400d
          type: string
        - name: Origin
          in: header
          description: e.g. {origin}
          required: false
          x-example: '{origin}'
          type: string
        - name: body
          in: body
          schema:
            type: array
            items:
              type: object
              properties:
                id:
                  type: string
                type:
                  type: object
                  properties:
                    type:
                      type: string
                to:
                  type: object
                  properties:
                    name:
                      type: string
                    tax_number:
                      type: string
                data:
                  type: object
                  properties:
                    id:
                      type: string
                    amount:
                      type: string
                    disbursement:
                      type: string
                    external_id:
                      type: string
                    number:
                      type: string
                    number_of_installments:
                      type: number
                    first_installment_date:
                      type: string
                    last_installment_date:
                      type: string
            example:
              - id: asset
                type:
                  type: CCB
                to:
                  name: Nogueira da Costa
                  tax_number: '99191423015'
                data:
                  id: '99999'
                  amount: '48666.24'
                  disbursement: '2332.80'
                  external_id: '99999'
                  number: AR0026
                  number_of_installments: 36
                  first_installment_date: '2025-01-25'
                  last_installment_date: '2027-12-25'
      produces:
        - application/json
      consumes:
        - application/json
      security:
        - oauth2: []
