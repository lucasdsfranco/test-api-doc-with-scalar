swagger: '2.0'
info:
  title: API Plataforma IDT
  version: ''
  description: >-
    <b>E-mail:</b> developers@plataformaidt.com.br


    Descubra todas as funcionalidades da nossa plataforma para que você possa
    criar uma operação de crédito de forma simples, segura e sustentável.

    <br><br><b>Postman Collection:</b> <a
    href="https://s3.us-east-1.amazonaws.com/public.plataformaidt.com.br/IDT+API+Collection+V1.5.postman_collection.json">Download</a>


    <b> URL Playground: </b> https://api.play.plataformaidt.com.br/v1


    <b> URL Production: </b> https://api.plataformaidt.io/v1

    <br><br><br>

    <b> IMPORTANTE: </b> O acesso aos recursos da API Plataforma IDT podem
    variar conforme as regras de negócio da integração e as permissões da
    credencial utilizada.
host: api.play.plataformaidt.com.br
basePath: /v1
schemes:
  - https
paths:
  /movements/{category}:
    post:
      responses:
        '201':
          description: Created. Movimento foi criado com sucesso
          headers: {}
          examples: {}
        '400':
          description: >-
            Bad Request. Pode ocorrer quando o envio dos dados está
            inconsistente
          headers: {}
          examples: {}
        '401':
          description: Os dados de autenticação do usuário não são válidos
          headers: {}
          examples: {}
        '403':
          description: O usuário não está autorizado a realizar essa operação
          headers: {}
          examples: {}
      summary: Criar movimento
      operationId: Criar movimento
      description: >-
        Realiza a criação de um movimento financeiro em uma operação de crédito.


        Protocolo de segurança e autenticação -
        <b>[oAuth2](reference/#oauth2)</b>


        <b>IMPORTANTE:</b> O perfil de uso <b>"SACADO"</b> deve utilizar o
        objeto <i>`from`</i> para informar os dados do participante
        <b>"Sacado"</b> e o objeto <i>`to`</i> para informar os dados do
        participante <b>"Fornecedor"</b>, enquanto o perfil de uso
        <b>"FORNECEDOR"</b> deve utilizar o objeto <i>`from`</i> para informar
        os dados do participante <b>"Fornecedor"</b> e o objeto <i>`to`</i> para
        informar os dados do participante <b>"Sacado"</b>.
      tags:
        - Criar movimento
      parameters:
        - name: category
          in: path
          description: '**Path parameter.** Tipo de movimento a ser criado.'
          required: true
          x-example: assets
          type: string
        - name: origin
          in: header
          description: e.g. {origin}
          required: false
          x-example: '{origin}'
          type: string
        - name: body
          in: body
          schema:
            type: object
            required:
              - type
              - from
              - to
              - data
              - type
              - from
              - to
              - data
            properties:
              type:
                type: object
                properties:
                  id:
                    type: string
                    example: assets
                    description: 'Identificador do tipo de movimento. Exemplo:'
                  sub_type:
                    type: string
                    example: invoices
                    description: 'Subtipo do movimento. Exemplo:'
                  title:
                    type: string
                    example: Fatura
                    description: 'Informação para apresentação. Exemplo:'
                  external_type:
                    type: string
                    example: Fatura
                    description: 'Tipo de movimento no cliente. Exemplo:'
              from:
                type: object
                properties:
                  name:
                    type: string
                    example: FORNECEDOR TESTE
                    description: 'Nome do participante. Exemplo:'
                  data:
                    type: object
                    properties:
                      tax_number:
                        type: string
                        example: '80988977000106'
                        description: 'Número de identificação. Exemplo:'
                      type:
                        type: string
                        example: seller
                        description: 'Tipo do participante. Exemplo:'
                description: Participante de origem
              to:
                type: object
                properties:
                  name:
                    type: string
                    example: SACADO TESTE LTDA
                    description: 'Nome do participante. Exemplo:'
                  data:
                    type: object
                    properties:
                      tax_number:
                        type: string
                        example: '04882084000195'
                        description: 'Número de identificação. Exemplo:'
                      type:
                        type: string
                        example: buyer
                        description: 'Tipo do participante. Exemplo:'
                description: Participante de destino
              data:
                type: object
                required:
                  - status
                properties:
                  amount:
                    type: string
                    example: '2100.50'
                    description: 'Valor do Ativo. Exemplo:'
                  date:
                    type: string
                    example: '2023-07-01'
                    description: 'Data de emissão. Formato: AAAA-MM-DD. Exemplo:'
                  external_id:
                    type: string
                    example: '211'
                    description: 'Número do ativo. Exemplo:'
                  post_date:
                    type: string
                    example: '2023-09-25'
                    description: 'Data de vencimento. Formato: AAAA-MM-DD. Exemplo:'
                  number:
                    type: string
                    example: '211'
                    description: 'Número do ativo. Exemplo:'
                  nfe_key:
                    type: string
                    example: '42230707549194000128550030000879961586032907'
                    description: >-
                      Número da chave de acesso da NF-e. Campo não obrigatório.
                      Exemplo:
                  status:
                    type: object
                    properties:
                      name:
                        type: string
                        example: Disponível
                        description: 'Status. Exemplo:'
                      category:
                        type: string
                        example: created
                        description: 'Status de criação. Exemplo:'
                    description: Status do ativo
                description: Dados do Ativo
      consumes:
        - application/json
      security:
        - oauth2: []
    get:
      responses:
        '200':
          description: Success. Busca dos movimentos retornada com sucesso
          headers: {}
          examples:
            application/json:
              page:
                size: 50
                number: 0
                total_pages: 1
                total_elements: 1
              content:
                - id: asset
                  type:
                    id: assets
                    sub_type: invoices
                    external_type: Fatura
                    title: Fatura
                  data:
                    id: 2465175000-#90335456000103#100015
                    status:
                      name: Disponivel
                      category: created
                    external_id: '100015'
                    date: '2023-09-19'
                    amount: '2540.45'
                    updated_at: '2023-09-20T17:39:23.799176'
                    created_at: '2023-09-20T17:39:22.917647'
                    post_date: '2023-10-18'
                    nfe_key: '42230707549194000128550030000879961586032907'
                    number: '100015'
                  from:
                    name: FORNECEDOR EXEMPLO
                    data:
                      type: seller
                      tax_number: 2465175000-
                  to:
                    name: SACADO EXEMPLO
                    data:
                      type: buyer
                      tax_number: '90335456000103'
                  parent: {}
          schema:
            type: object
            properties:
              page:
                type: object
                properties:
                  size:
                    type: number
                    description: Tamanho da página
                  number:
                    type: number
                    description: Número da página
                  total_elements:
                    type: number
                    description: Total de elementos
                  total_pages:
                    type: number
                    description: Total de páginas
              content:
                type: object
                properties:
                  id:
                    type: string
                  type:
                    type: object
                    properties:
                      id:
                        type: string
                        description: Identificador do tipo de movimento
                      sub_type:
                        type: string
                        description: Subtipo do movimento.
                      title:
                        type: string
                        description: Informação para apresentação
                      external_type:
                        type: string
                        description: Tipo de movimento no cliente
                  from:
                    type: object
                    properties:
                      name:
                        type: string
                        description: Nome do participante
                      data:
                        type: object
                        properties:
                          tax_number:
                            type: string
                            description: Número de identificação
                          type:
                            type: string
                            description: Tipo do participante
                    description: Participante de origem
                  to:
                    type: object
                    properties:
                      name:
                        type: string
                        description: Nome do participante
                      data:
                        type: object
                        properties:
                          tax_number:
                            type: string
                            description: Número de identificação
                          type:
                            type: string
                            description: Tipo do participante
                    description: Participante de destino
                  data:
                    type: object
                    properties:
                      amount:
                        type: string
                        description: Valor do Ativo
                      date:
                        type: string
                        description: Data de emissão
                      external_id:
                        type: string
                        description: Número do ativo
                      post_date:
                        type: string
                        description: Data de vencimento
                      number:
                        type: string
                        description: Número do ativo
                      nfe_key:
                        type: string
                        description: Número da chave de acesso da NF-e
                    description: Dados do Ativo
        '400':
          description: >-
            Bad Request. Pode ocorrer quando o envio dos dados está
            inconsistente
          headers: {}
          examples: {}
        '401':
          description: Os dados de autenticação do usuário não são válidos
          headers: {}
          examples: {}
        '403':
          description: O usuário não está autorizado a realizar essa operação
          headers: {}
          examples: {}
      summary: Buscar movimento
      operationId: Buscar movimento
      description: >-
        Realiza a busca de movimentos financeiros por categoria.


        Protocolo de segurança e autenticação -
        <b>[oAuth2](reference/#oauth2)</b>
      tags:
        - Buscar movimento
      parameters:
        - name: category
          in: path
          description: |
            **Path parameter.** Tipo de movimento a ser buscado.
            Valores possíveis: `assets`, `receipts`, `trades`, `offers`
          required: true
          x-example: assets
          type: string
        - name: page
          in: body
          description: '**Query parameter.** Página que deseja consultar (começando por 0)'
          required: true
          x-example: '0'
          schema:
            type: number
        - name: size
          in: body
          description: '**Query parameter.** Quantidade de itens por página'
          required: true
          x-example: '50'
          schema:
            type: number
        - name: start_date
          in: body
          description: '**Query parameter.** Data inicial (AAAA-MM-DD)'
          required: false
          x-example: '2020-10-10'
          schema:
            type: string
        - name: end_date
          in: body
          description: '**Query parameter.** Data final (AAAA-MM-DD)'
          required: false
          x-example: '2021-10-10'
          schema:
            type: string
        - name: tax_number
          in: body
          description: '**Query parameter.** CPF ou CNPJ envolvido'
          required: false
          x-example: '80988977000106'
          schema:
            type: string
        - name: origin
          in: header
          description: e.g. {origin}
          required: false
          x-example: '{origin}'
          type: string
      produces:
        - application/json
      consumes:
        - application/json
      security:
        - oauth2: []
    patch:
      responses:
        '202':
          description: Accepted. Indica que a requisição foi recebida e será processada.
          headers: {}
          examples: {}
        '400':
          description: >-
            Bad Request. Pode ocorrer quando o envio dos dados está
            inconsistente
          headers: {}
          examples: {}
        '401':
          description: Os dados de autenticação do usuário não são válidos
          headers: {}
          examples: {}
        '403':
          description: O usuário não está autorizado a realizar essa operação
          headers: {}
          examples: {}
      summary: Aprovar ou reprovar um movimento
      operationId: Aprovar ou reprovar um movimento
      description: >-
        Executa as ações de <b>aprovar</b> ou <b>reprovar</b> um determinado
        movimento.


        O movimento que será <b><i>aprovado</b></i> ou <b><i>reprovado</b></i>
        sempre estará dentro de outro movimento (chamado de <b><i>movimento
        pai</b></i>), portanto, tanto o movimento que será alterado, quanto o
        movimento pai, deverão ser informados no payload da requisição.


        Protocolo de segurança e autenticação -
        <b>[oAuth2](reference/#oauth2)</b>
      tags:
        - Aprovar ou reprovar um movimento
      parameters:
        - name: category
          in: path
          description: >-
            **Path parameter.** Tipo de movimento a ser Aprovado. Contudo,
            sempre será aprovado um movimento do tipo <b>offer</b>.
          required: true
          x-example: offers
          type: string
        - name: origin
          in: header
          description: e.g. {origin}
          required: false
          x-example: '{origin}'
          type: string
        - name: body
          in: body
          schema:
            type: object
            properties:
              action:
                type: string
                description: >-
                  Ação sobre o movimento. Suportados: `approve` ou `reprove`.
                  Exemplo:
              data:
                type: object
                properties:
                  id:
                    type: string
                    description: >-
                      Identificador do movimento que sofrerá a ação desta
                      requisição. Exemplo:
                  movement_action:
                    type: string
                    description: >-
                      Ação sobre o movimento. Use approve, para Aprovado e
                      reprove para Reprovado. Exemplo:
                  reason:
                    type: string
                    description: >-
                      Descrição do motivo da reprova. Obrigatório quando é
                      reprove. Exemplo:
                  category:
                    type: string
                    description: >-
                      Categoria do movimento que sofrerá a ação desta
                      requisição. Exemplo:
                  date:
                    type: string
                    description: >-
                      Data do movimento que sofrerá a ação desta requisição.
                      Formato: AAAA-MM-DD. Exemplo:
                  external_id:
                    type: string
                    description: >-
                      Id externo do movimento que sofrerá a ação desta
                      requisição. Exemplo:
                  parent:
                    type: object
                    properties:
                      id:
                        type: string
                        description: 'Identificador do movimento `Pai`. Exemplo:'
                      category:
                        type: string
                        description: 'Categoria do movimento `Pai`. Exemplo:'
                      date:
                        type: string
                        description: 'Data do movimento `Pai`. Formato: AAAA-MM-DD. Exemplo:'
                      external_id:
                        type: string
                        description: 'Id do movimento `Pai`. Exemplo:'
                    description: Informações do movimento `Pai`.
                required:
                  - movement_action
                  - parent
                description: Dados do Ativo
            required:
              - action
              - data
            example:
              action: reprove
              data:
                id: 1vIoiSAQ9tHl7Z11eP6y47EAD12
                movement_action: reprove
                reason: Reprovo esta proposta
                category: offer
                date: '2021-01-01'
                external_id: '123456'
                parent:
                  id: 2vIoiSAQ9tHl7Z11eP6y47EAD13
                  category: trade
                  date: '2021-01-01'
                  external_id: '789456'
      consumes:
        - application/json
      security:
        - oauth2: []
  /movements/{category}/search:
    post:
      responses:
        '200':
          description: >-
            Success. Lista de movimentos retornada na busca com sucesso (exemplo
            de um response)
          headers: {}
          examples: {}
        '400':
          description: >-
            Bad Request. Pode ocorrer quando o envio dos dados está
            inconsistente
          headers: {}
          examples: {}
        '401':
          description: Os dados de autenticação do usuário não são válidos
          headers: {}
          examples: {}
        '403':
          description: O usuário não está autorizado a realizar essa operação
          headers: {}
          examples: {}
      summary: Filtrar movimento
      operationId: Filtrar movimento
      description: >-
        <b>Filtra movimentos</b> de acordo com os filtros associados ao
        programa. <b>Importante</b> ressaltar que podem ser declaradas diversas
        "<b>keys</b>" (<i>parâmetros de busca</i>) dentro do body, <b>aplicando
        mais de um parâmetro no filtro</b>.


        Protocolo de segurança e autenticação -
        <b>[oAuth2](reference/#oauth2)</b>
      tags:
        - Filtrar movimento
      parameters:
        - name: category
          in: path
          description: >-
            **Path parameter.** Tipo de movimento a ser buscado. <ul>Suportados:
            <b>`asset`</b> <b>`receipts`</b> <b>`trades`</b> <b>`offers`</b>
            </ul>
          required: true
          x-example: assets
          type: string
        - name: origin
          in: header
          description: e.g. {origin}
          required: false
          x-example: '{origin}'
          type: string
        - name: body
          in: body
          schema:
            anyOf:
              - type: object
                properties:
                  filters:
                    type: array
                  pagination:
                    type: object
                    properties:
                      page:
                        type: number
                        description: >-
                          Página que deseja consultar (começando por 0).
                          Exemplo:
                      size:
                        type: number
                        description: 'Quantidade de itens por página. Exemplo:'
                      sort_by:
                        type: string
                        description: >-
                          Valor utilizado como parâmetro para ordenação do
                          resultado da busca. Exemplo:
                      sort_order:
                        type: string
                        description: >-
                          Ordenação do resultado da busca, "asc" para ascendete
                          e "desc" para descendente. Exemplo:
                    description: Dados da paginação
                required:
                  - filters
                  - pagination
                example:
                  filters:
                    - _comment1: Busca pelo external-id da asset
                      key: external-id
                      condition: contains
                      values:
                        - '000151084591800012025'
                    - key: status.name
                      condition: contains
                      values:
                        - Disponível
                  pagination:
                    sort_by: number.keyword
                    sort_order: desc
                    page: 0
                    size: 25
              - type: object
                properties:
                  filters:
                    type: array
                  pagination:
                    type: object
                    properties:
                      page:
                        type: number
                        description: >-
                          Página que deseja consultar (começando por 0).
                          Exemplo:
                      size:
                        type: number
                        description: 'Quantidade de itens por página. Exemplo:'
                      sort_by:
                        type: string
                        description: >-
                          Valor utilizado como parâmetro para ordenação do
                          resultado da busca. Exemplo:
                      sort_order:
                        type: string
                        description: >-
                          Ordenação do resultado da busca, "asc" para ascendete
                          e "desc" para descendente. Exemplo:
                    description: Dados da paginação
                required:
                  - filters
                  - pagination
                example:
                  _comment1: >-
                    Busca por status Disponivel ou Negociado e data importação
                    entre duas datas
                  filters:
                    - condition: equals
                      input_type: select
                      key: status.name
                      name: Status
                      type: string
                      values:
                        - Disponivel
                        - Negociado
                    - condition: between
                      input_type: date
                      key: created_at
                      name: Data importação
                      type: date
                      values:
                        - '2023-07-15'
                        - '2023-08-14'
                  pagination:
                    page: 0
                    size: 25
                    sort_by: created_at
                    sort_order: desc
              - type: object
                properties:
                  filters:
                    type: array
                  pagination:
                    type: object
                    properties:
                      page:
                        type: number
                        description: >-
                          Página que deseja consultar (começando por 0).
                          Exemplo:
                      size:
                        type: number
                        description: 'Quantidade de itens por página. Exemplo:'
                      sort_by:
                        type: string
                        description: >-
                          Valor utilizado como parâmetro para ordenação do
                          resultado da busca. Exemplo:
                      sort_order:
                        type: string
                        description: >-
                          Ordenação do resultado da busca, "asc" para ascendete
                          e "desc" para descendente. Exemplo:
                    description: Dados da paginação
                required:
                  - filters
                  - pagination
                example:
                  _comment1: >-
                    Busca por data de importação entre duas datas e nome do
                    fornecedor contém FORNECEDOR1
                  filters:
                    - condition: between
                      input_type: date
                      key: created_at
                      name: Data importação
                      type: date
                      values:
                        - '2023-07-15'
                        - '2023-08-14'
                    - condition: contains
                      input_type: text
                      key: from.name.keyword
                      name: Fornecedor
                      type: string
                      values:
                        - FORNECEDOR1
                  pagination:
                    page: 0
                    size: 25
                    sort_by: created_at
                    sort_order: desc
              - type: object
                properties:
                  filters:
                    type: array
                  pagination:
                    type: object
                    properties:
                      page:
                        type: number
                        description: >-
                          Número da página inicial da paginação do resultado do
                          filtro. Exemplo:
                      size:
                        type: number
                        description: 'Quantidade de resultados por página. Exemplo:'
                      sort_by:
                        type: string
                        description: >-
                          Valor utilizado como parâmetro para ordenação do
                          resultado da busca. Exemplo:
                      sort_order:
                        type: string
                        description: >-
                          Ordenação do resultado da busca, "asc" para ascendete
                          e "desc" para descendente. Exemplo:
                    description: Dados da paginação
                required:
                  - filters
                  - pagination
                example:
                  _comment1: >-
                    Busca por data de importação entre duas datas e CNPJ do
                    fornecedor conter dois valores
                  filters:
                    - condition: between
                      input_type: date
                      key: created_at
                      name: Data importação
                      type: date
                      values:
                        - '2023-07-15'
                        - '2023-08-14'
                    - condition: contains
                      input_type: text
                      key: from.tax-number.keyword
                      name: Fornecedor
                      type: string
                      values:
                        - '12345678901234'
                        - '43210987654321'
                  pagination:
                    page: 0
                    size: 25
                    sort_by: created_at
                    sort_order: desc
      consumes:
        - application/json
      security:
        - oauth2: []
