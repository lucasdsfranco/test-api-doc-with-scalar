  - name: Criar usuários
  - name: Atualizar usuário
  - name: Enviar convite para novos participantes
  - name: Consultar Cadastro
  - name: Enviar Opt-in
  - name: Enviar Opt-out
  - name: Webhook/Callback
  - name: Agenda e Contrato
