      summary: Buscar movimentos relacionado
      operationId: Buscar movimentos relacionado
      description: >-
        <b>Busca movimentos</b> financeiros relacionados a um movimento já
        existente no programa de crédito.


        Protocolo de segurança e autenticação -
        <b>[oAuth2](reference/#oauth2)</b>
      tags:
        - Buscar movimento relacionado
      parameters:
        - name: category
          in: path
          description: >-
            **Query parameter.** Categoria do movimento pai. <ul>Suportados:
